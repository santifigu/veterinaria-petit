{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="min-h-screen bg-background-light dark:bg-background-dark py-20">
    <div class="container mx-auto px-4 sm:px-6 lg:px-20 py-8">
        <div class="max-w-3xl mx-auto">
            <a href="javascript:history.back()" class="inline-flex items-center gap-2 text-primary hover:underline mb-6">
                <span class="material-symbols-outlined">arrow_back</span>
                <span>Volver</span>
            </a>

            <div class="bg-white dark:bg-[#162a1c] rounded-3xl p-8 border border-[#e7f3eb] dark:border-[#1a3321] shadow-2xl">
                <h1 class="text-3xl font-black text-[#0d1b12] dark:text-white mb-6">Editar Mascota</h1>

                <form method="POST" enctype="multipart/form-data" class="space-y-6">
                    {% csrf_token %}

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Nombre</label>
                            <input type="text" name="nombre" value="{{ mascota.nombre }}" required
                                class="w-full bg-background-light dark:bg-background-dark border border-gray-300 dark:border-[#1a3321] rounded-lg p-3 focus:ring-2 focus:ring-primary focus:outline-none">
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Tipo</label>
                            <select name="tipo" required
                                class="w-full bg-background-light dark:bg-background-dark border border-gray-300 dark:border-[#1a3321] rounded-lg p-3 focus:ring-2 focus:ring-primary focus:outline-none">
                                <option value="perro" {% if mascota.tipo == 'perro' %}selected{% endif %}>Perro</option>
                                <option value="gato" {% if mascota.tipo == 'gato' %}selected{% endif %}>Gato</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Raza</label>
                            <input type="text" name="raza" value="{{ mascota.raza }}" required
                                class="w-full bg-background-light dark:bg-background-dark border border-gray-300 dark:border-[#1a3321] rounded-lg p-3 focus:ring-2 focus:ring-primary focus:outline-none">
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Sexo</label>
                            <select name="sexo" required
                                class="w-full bg-background-light dark:bg-background-dark border border-gray-300 dark:border-[#1a3321] rounded-lg p-3 focus:ring-2 focus:ring-primary focus:outline-none">
                                <option value="macho" {% if mascota.sexo == 'macho' %}selected{% endif %}>Macho</option>
                                <option value="hembra" {% if mascota.sexo == 'hembra' %}selected{% endif %}>Hembra</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Fecha de Nacimiento</label>
                            <input type="date" name="fecha_nacimiento" value="{% if mascota.fecha_nacimiento %}{{ mascota.fecha_nacimiento|date:'Y-m-d' }}{% endif %}"
                                class="w-full bg-background-light dark:bg-background-dark border border-gray-300 dark:border-[#1a3321] rounded-lg p-3 focus:ring-2 focus:ring-primary focus:outline-none">
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Peso (kg)</label>
                            <input type="number" step="0.01" name="peso" value="{{ mascota.peso }}"
                                class="w-full bg-background-light dark:bg-background-dark border border-gray-300 dark:border-[#1a3321] rounded-lg p-3 focus:ring-2 focus:ring-primary focus:outline-none">
                        </div>

                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Color / Particularidades</label>
                            <input type="text" name="color" value="{{ mascota.color }}" required
                                class="w-full bg-background-light dark:bg-background-dark border border-gray-300 dark:border-[#1a3321] rounded-lg p-3 focus:ring-2 focus:ring-primary focus:outline-none"
                                placeholder="Ej: Dorado claro con manchas blancas">
                        </div>

                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Microchip</label>
                            <input type="text" name="microchip" value="{{ mascota.microchip }}"
                                class="w-full bg-background-light dark:bg-background-dark border border-gray-300 dark:border-[#1a3321] rounded-lg p-3 focus:ring-2 focus:ring-primary focus:outline-none">
                        </div>

                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Observaciones</label>
                            <textarea name="observaciones" rows="3"
                                class="w-full bg-background-light dark:bg-background-dark border border-gray-300 dark:border-[#1a3321] rounded-lg p-3 focus:ring-2 focus:ring-primary focus:outline-none">{{ mascota.observaciones }}</textarea>
                        </div>
                    </div>

                    <div class="flex gap-4 pt-6">
                        <button type="submit" class="flex-1 bg-primary text-teal-soft py-4 rounded-xl font-bold hover:shadow-lg transition-all">
                            Guardar Cambios
                        </button>
                        <a href="javascript:history.back()" class="flex-1 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-white py-4 rounded-xl font-bold text-center hover:shadow-lg transition-all">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
